<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title></title>
        <link rel="stylesheet" type="text/css" href="css\background.css">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
        <script>

        function validateForm() {
            var x = document.forms["nameEntry"]["firstname"].value;
            var err = document.getElementsByClassName("invalid-feedback");
            if (x.toLowerCase() != "X") {
            err.style.setProperty('display', 'contents');
            return false;
            }
        }
        </script>
    </head>
    <body>
        
        <canvas id="canvas" width=""></canvas> 
            <div id="inputs">
                Text <input type="text" placeholder="What is your name?" value="What is your name?" id="texty"><br>
                Speed <input type="number" id="omegset" step="0.1" value="1.8"><br>
                Amplitude <input type="number" id="ampset" step='1' value='20'><br>
                Font size <input type="number" id="fonts" step='1' value='50'><br>
                Waves <input type="number" id="waves" step='0.1' value='4' min='0' max='8'><br>
            </div>
        <div id="contain">
            <div id="wrap"></div>
            <div id="name">
                <form method="post" name="nameEntry">
                    <div class="form-row" style="flex-wrap: nowrap;">
                        <input class="form-control form-control-lg" type="password" id="firstname" placeholder="Enter name here..." pattern="x">
                        <button type="submit" class="btn btn-dark mb-2" style="margin-left: 10px;">Confirm identity</button>
                    </div>
                        <div id="invalid-feedback" style="color: red;">
                            Name must be X.
                        </div>
                </form>
            </div>
        </div>
       <script src="js\background.js"></script>
       <script src="js\validate.js"></script>
    </body>
</html>
