<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title></title>
        <link rel="stylesheet" type="text/css" href="css\background.css">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    </head>
    <body>
         <canvas id="canvas" width=""></canvas> 
       
        <div id="inputs">
        Text <input type="text" placeholder="What is your name?" value="What is your name?" id="texty"><br>
        Speed <input type="number" id="omegset" step="0.1" value="1.8"><br>
        Amplitude <input type="number" id="ampset" step='1' value='20'><br>
        Font size <input type="number" id="fonts" step='1' value='50'><br>
        Waves <input type="number" id="waves" step='0.1' value='4' min='0' max='8'><br>
        </div>
        <div id="container">
            <div id="wrap"></div>
        </div>
        <div height=100vh width=100vw>
            <input class="form-control form-control-lg" type="text" placeholder=".form-control-lg">
        </div>

       <script src="js\background.js"></script>
    </body>
</html>
