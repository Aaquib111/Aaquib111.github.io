<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title></title>
        <link rel="stylesheet" type="text/css" href="css\background.css">
    </head>
    <body>
       <canvas id="canvas" width=""></canvas> 
       
       <div id="inputs">
        Text <input type="text" placeholder="What is your name?" value="What is your name?" id="texty"><br>
        Speed <input type="number" id="omegset" step="0.1" value="1.8"><br>
        Amplitude <input type="number" id="ampset" step='1' value='20'><br>

        Waves <input type="number" id="waves" step='0.1' value='4' min='0' max='8'><br>
      </div>

       <div id="wrap"></div>


       <script src="js\background.js"></script>
    </body>
</html>
